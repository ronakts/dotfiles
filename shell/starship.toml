# Starship config — https://starship.rs/config
#
# Intentionally minimal: rely on starship's stock defaults for layout,
# colors, glyphs, git formatting, and the language version segments.
# The defaults are well-tuned and match what you see on starship.rs.
#
# Tweak individual modules below as needed. Examples:
#   - to hide the python version: [python] disabled = true
#   - to truncate long paths: [directory] truncation_length = 3
#   - to change prompt arrow: [character] success_symbol = "[➜](bold green)"
