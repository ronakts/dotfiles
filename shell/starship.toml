# Starship config — https://starship.rs/config
#
# Approach: keep starship's stock styling (colors, glyphs, git format,
# layout) but disable modules that add noise without earning their space.
# Re-enable any below by flipping `disabled = true` to `false`.

# ---- identity / location: noisy in SSH/Coder, off ----
[username]
disabled = true

[hostname]
disabled = true

# Use the Material git-branch glyph (U+F062C, "󰘬") instead of the tiny
# Powerline default. Requires a Nerd Font.
[git_branch]
symbol = "󰘬 "

# Replace the default ASCII git-status symbols ($, +, ?, !, etc.) with
# Nerd Font glyphs. They render as distinct icons rather than mushing
# together visually. ahead/behind keep the unicode arrows since they
# also carry counts.
[git_status]
stashed     = ""        # was $  — stack
staged      = ""        # was +  — plus circle
untracked   = ""        # was ?  — question
modified    = ""        # was !  — pencil
deleted     = ""        # was ✘  — trash
conflicted  = ""        # was =  — warning triangle
renamed     = ""        # was »  — long arrow
ahead       = "⇡${count}"
behind      = "⇣${count}"
diverged    = "⇕⇡${ahead_count}⇣${behind_count}"

# ---- language version segments ----
# (the info is two-finger checks away when you actually need it:
#  python --version, node --version, go version)
[python]
disabled = true
[nodejs]
disabled = true
[golang]
disabled = true
[rust]
disabled = true
[ruby]
disabled = true
[java]
disabled = true
[lua]
disabled = true
[package]
disabled = true
[pixi]
disabled = true
[direnv]
disabled = true
[shell]
disabled = true
[time]
disabled = true

# ---- cloud / infra context ----
# (starship pulls from your shell env; the shell env is already noisy enough)
[aws]
disabled = true
[gcloud]
disabled = true
[kubernetes]
disabled = true
[terraform]
disabled = true
[docker_context]
disabled = true
[nix_shell]
disabled = true
# The `container` module is the source of "⬢ [Docker]" — fires whenever
# the prompt is running inside a container (every Coder workspace).
[container]
disabled = true

# Everything else (directory, git_branch, git_status, git_state, cmd_duration,
# character) keeps stock starship styling.
